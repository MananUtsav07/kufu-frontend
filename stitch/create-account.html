<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account - AutoLead AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1325ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101222",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Create Account</h2>
</div>
<!-- Hero Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="bg-cover bg-center flex flex-col justify-end overflow-hidden bg-primary/10 @[480px]:rounded-xl min-h-[218px] relative" data-alt="Abstract futuristic AI neural network visualization" style='background-image: linear-gradient(0deg, rgba(16, 18, 34, 0.8) 0%, rgba(16, 18, 34, 0.2) 100%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuCUGb8lenjfUYzkcwgT3-19O87vCBiH6Wi7M34rFVpAn57_fAihnyP3rzVyNUJ2c34W7nWGcS5YU1mRyFqE3HBmrN2-sfoQ0eM9AflmX4iWNRvqyrW7lJnKtjGhAoeDO7yJnlaSX3MBDdSV9ysVPe9sEQHeD5kqPYyDmGcFKV2rgoGKvwylCZz9mEWJL1xvDoKDqeQwKkjEUAFnT0S3gZdTTS-DCW-WNe7l3Nyf4HS_Ga0c6_VVwzAUGqPOTDOwz6MpJA05JaiNL9A");'>
<div class="flex p-6">
<p class="text-slate-100 tracking-tight text-[28px] font-bold leading-tight">AutoLead AI</p>
</div>
</div>
</div>
</div>
<!-- Form Content -->
<div class="max-w-[480px] w-full mx-auto px-4 pb-12">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-center pb-2 pt-8">Join AutoLead AI</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-8 text-center">Empower your business with AI-driven lead generation.</p>
<form class="space-y-4">
<!-- Full Name Field -->
<div class="flex flex-col w-full">
<label class="text-slate-900 dark:text-slate-200 text-sm font-medium leading-normal pb-1.5">Full Name</label>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col w-full">
<label class="text-slate-900 dark:text-slate-200 text-sm font-medium leading-normal pb-1.5">Email Address</label>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col w-full">
<label class="text-slate-900 dark:text-slate-200 text-sm font-medium leading-normal pb-1.5">Password</label>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="Create a strong password" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-slate-400 cursor-pointer">visibility</span>
</div>
</div>
<!-- Business Type Dropdown -->
<div class="flex flex-col w-full">
<label class="text-slate-900 dark:text-slate-200 text-sm font-medium leading-normal pb-1.5">Business Type</label>
<select class="form-select flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 h-14 p-[15px] text-base font-normal leading-normal appearance-none">
<option disabled="" selected="" value="">Select your business type</option>
<option value="saas">SaaS / Software</option>
<option value="agency">Marketing Agency</option>
<option value="ecommerce">E-commerce</option>
<option value="real-estate">Real Estate</option>
<option value="other">Other</option>
</select>
</div>
<!-- Sign Up Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-colors duration-200 shadow-lg shadow-primary/20" type="submit">
                        Sign Up
                    </button>
</div>
</form>
<!-- Footer Link -->
<div class="pt-8 pb-4 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline ml-1" href="#">Sign In</a>
</p>
</div>
<!-- Terms -->
<div class="mt-4 text-center">
<p class="text-slate-500 dark:text-slate-500 text-[12px] leading-relaxed">
                    By signing up, you agree to our Terms of Service and Privacy Policy.
                </p>
</div>
</div>
<div class="h-8 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
