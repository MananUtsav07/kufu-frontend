<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
<div class="w-full max-w-[480px] space-y-8 bg-slate-50/50 dark:bg-slate-900/40 p-8 rounded-xl border border-slate-200 dark:border-slate-800 shadow-2xl backdrop-blur-sm">
<div class="flex flex-col items-center">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(19,37,236,0.3)]">
<span class="material-symbols-outlined text-white text-3xl">auto_awesome</span>
</div>
<h2 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight tracking-tight text-center">AutoLead AI</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal mt-2 text-center">Log in to your account</p>
</div>
<form class="space-y-6">
<div class="space-y-4">
<label class="block">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium mb-1.5 block">Email Address</span>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-white border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="name@company.com" type="email"/>
</label>
<label class="block">
<div class="flex justify-between items-center mb-1.5">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Password</span>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="form-input w-full rounded-lg text-slate-900 dark:text-white border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary h-12 pl-4 pr-12 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                Sign In
                <span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-300 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background-light dark:bg-[#15172a] px-3 text-slate-500 font-medium">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-1 gap-4">
<button class="flex w-full items-center justify-center gap-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm" type="button">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-medium">Google</span>
</button>
</div>
<p class="text-center text-sm text-slate-600 dark:text-slate-400">
            Don't have an account? 
            <a class="font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Create an account</a>
</p>
</div>
<div class="mt-8 flex gap-6 text-slate-500 dark:text-slate-500 text-xs font-medium uppercase tracking-wider">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
